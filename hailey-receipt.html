<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Hailey's receipt · Bananasplit</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--mono:'JetBrains Mono',monospace;--venmo:#008CFF}
*{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(180deg,#f4bb3f,#eaad2e);min-height:100vh;display:flex;justify-content:center;
font-family:var(--mono);-webkit-font-smoothing:antialiased;padding:34px 16px calc(34px + env(safe-area-inset-bottom))}
.receipt{width:100%;max-width:380px;color:#2b2b2b;align-self:flex-start;position:relative;overflow:hidden;
padding:34px 28px 34px;box-shadow:0 34px 56px -22px rgba(0,0,0,.4);
background:linear-gradient(102deg,transparent 55%,rgba(0,0,0,.04) 56.5%,rgba(255,255,255,.45) 57.5%,transparent 59%),linear-gradient(180deg,#ffffff,#f6f5f1)}
.store{font-size:42px;font-weight:800;font-style:italic;letter-spacing:-1.5px;text-transform:lowercase;color:#1f1f1f;line-height:.98;text-align:center}
.addr{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:#6c6c6c;text-align:center;margin-top:10px;line-height:1.7}
.meta{display:flex;justify-content:center;gap:22px;font-size:10.5px;letter-spacing:1px;color:#555;margin-top:9px;text-transform:uppercase}
.barcode{height:52px;width:64%;margin:18px auto 4px;background:repeating-linear-gradient(90deg,#1f1f1f 0 2px,transparent 2px 4px,#1f1f1f 4px 5px,transparent 5px 9px,#1f1f1f 9px 12px,transparent 12px 14px,#1f1f1f 14px 17px,transparent 17px 19px)}
.hcols{display:flex;justify-content:space-between;font-size:11px;font-weight:700;letter-spacing:1.2px;color:#2b2b2b;text-transform:uppercase;margin-top:16px;padding-bottom:4px}
.li{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;letter-spacing:.5px;text-transform:uppercase;color:#333;line-height:1.6;padding:5px 0}
.li .nm{display:flex;align-items:baseline}
.li .frac{font-size:8.5px;text-transform:none;color:#7a4ad0;background:rgba(122,74,208,.1);box-shadow:0 0 0 1px rgba(122,74,208,.28) inset;border-radius:3px;padding:1px 5px;margin-left:8px}
.li .v{font-variant-numeric:tabular-nums;font-weight:500}
.grand{display:flex;justify-content:space-between;align-items:baseline;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#1f1f1f;margin-top:16px;border-top:2px solid #1f1f1f;padding-top:14px}
.grand .v{font-variant-numeric:tabular-nums;font-size:18px}
.note{text-align:center;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#666;margin-top:16px;line-height:1.9}
.pay{display:block;margin-top:14px;padding:16px;border-radius:11px;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.5px;
color:#fff;background:linear-gradient(135deg,var(--venmo),#36a8ff);text-align:center;text-decoration:none;font-family:var(--mono);
box-shadow:0 12px 24px -8px rgba(0,140,255,.6)}
.pay:active{transform:translateY(1px)}
.foot{text-align:center;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-top:16px}
</style></head>
<body><div class="receipt">
<div class="store">irish times</div>
<div class="addr">split 3 ways · shaian & vieri</div>
<div class="meta"><span>Jun 14 2026</span><span>guest: Hailey</span></div>
<div class="barcode"></div>
<div class="hcols"><span>Your items</span><span>Share</span></div>
<div class="li"><span class="nm">Irish Times<span class="frac">1/3</span></span><span class="v">$38.24</span></div>
<div class="grand"><span>Your share</span><span class="v">$38.24</span></div>
<div class="note">Your share only · private to you<br>settles securely via venmo</div>
<a class="pay" href="https://venmo.com/?txn=pay&recipients=shaian-javaid&amount=38.24&note=Bananasplit%20-%20Irish%20Times%20split">Pay Shaian $38.24 on Venmo</a>
<div class="foot">powered by bananasplit 🍌</div>
</div></body></html>
